name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        # 仅安装跑测试所需的运行依赖（pytest + python-pptx + pandas）。
        # dashboard 用的 streamlit、Windows-only 的 comtypes 在测试中不需要，走轻路径不装。
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest "python-pptx>=0.6.23" "pandas>=2.0.0"

      - name: Run tests
        # 仓库无 pytest 配置/覆盖率门槛，-o addopts="" 仅作防护，确保无额外配置干扰。
        run: python -m pytest tests/ -o addopts="" -v
